<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Pet Adoption Portal</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Schoolbell&family=Love+Ya+Like+A+Sister&display=swap" rel="stylesheet">
</head>
<body>

    <div class="signup-container">
        <h2>Create Your Account</h2>
        <form action="./userSignup.php" method="POST" class="signup-form">
            <input type="text" name="fullname" placeholder="Full Name" required><br>
            <input type="email" name="email" placeholder="Email" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required><br>
            <button type="submit">Sign Up</button>
        </form>
    </div>

    <p class="login-link">
        Already have an account?
        <a href="./login.php" class="button" style="padding: 10px 20px; font-size: 16px; margin-top: 10px;">Log In</a>
    </p>

</body>
</html>
